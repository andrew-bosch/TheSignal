# grant_deed.yaml
# THE SIGNAL — Grant Deed component registration

# ── Component identity ────────────────────────────────────────────────────────
name: "Grant Deed"
parent_component: "Card"
description: "ARBITER-issued title card recording Faction's capital claim on a named district. Functions as a tripwire React card."
component_type: "card"

# State machine flags
actionable: true
transformable: true
receivable: true
transform_visibility: false
transform_orientation: false
transform_data: true

# ── Placement targets ─────────────────────────────────────────────────────────
targets:
  - "Arbiter Tableau"
  - "Dispatch Packet"
  - "Dispatch case"
  - "Faction hand"

# ── Verb × phase coverage ─────────────────────────────────────────────────────
verbs:
  - verb: "Add"
    beats:
      - "Placement"
  - verb: "Corrupt"
    beats:
      - "Month 1 — Beat 3"
      - "Month 2 — Beat 3"
  - verb: "Move"
    beats:
      - "Month 1 — Beat 3"
      - "Month 2 — Beat 3"
      - "Debrief"
  - verb: "Invoke"
    beats:
      - "Month 1 — Beat 3"
      - "Month 2 — Beat 3"
      - "Month 3 — Beat 4"
  - verb: "Remove"
    beats:
      - "Month 1 — Beat 3"
      - "Month 2 — Beat 3"
      - "Month 3 — Beat 4"

# ── Role assignments ──────────────────────────────────────────────────────────
roles:
  - verb: "Add"
    player_role: "ARBITER"
    phase: "initiator"
  - verb: "Add"
    player_role: "ARBITER"
    phase: "executor"
  - verb: "Add"
    player_role: "ARBITER"
    phase: "fulfiller"
  - verb: "Corrupt"
    player_role: "ARBITER"
    phase: "initiator"
  - verb: "Corrupt"
    player_role: "ARBITER"
    phase: "executor"
  - verb: "Corrupt"
    player_role: "ARBITER"
    phase: "fulfiller"
  - verb: "Move"
    player_role: "ARBITER"
    phase: "initiator"
    notes: "ARBITER places completed deed in dispatch case"
  - verb: "Move"
    player_role: "ARBITER"
    phase: "executor"
  - verb: "Move"
    player_role: "ARBITER"
    phase: "fulfiller"
  - verb: "Move"
    player_role: "Faction"
    phase: "initiator"
    notes: "Faction moves deed to hand at Debrief"
  - verb: "Move"
    player_role: "Faction"
    phase: "executor"
  - verb: "Invoke"
    player_role: "Faction"
    phase: "initiator"
    notes: "Faction invokes Grant Deed"
  - verb: "Invoke"
    player_role: "Faction"
    phase: "executor"
  - verb: "Invoke"
    player_role: "ARBITER"
    phase: "fulfiller"
  - verb: "Remove"
    player_role: "ARBITER"
    phase: "initiator"
    notes: "ARBITER removes/consumes Grant Deed"
  - verb: "Remove"
    player_role: "ARBITER"
    phase: "executor"
  - verb: "Remove"
    player_role: "ARBITER"
    phase: "fulfiller"

# ── Action primitives ─────────────────────────────────────────────────────────
primitives:
  - beat: "Placement"
    subject: "ARBITER"
    verb: "Add"
    trigger: "rule.resolution"
    notes: "ARBITER holds blank Grant Deeds on ARBITER Tableau"
  - beat: "Month 1 — Beat 3"
    subject: "ARBITER"
    verb: "Corrupt"
    trigger: "rule.card"
    notes: "ARBITER writes owner and district on Grant Deed"
  - beat: "Month 1 — Beat 3"
    subject: "ARBITER"
    verb: "Move"
    trigger: "rule.card"
    notes: "ARBITER places completed Grant Deed in acting faction case"
  - beat: "Month 2 — Beat 3"
    subject: "ARBITER"
    verb: "Corrupt"
    trigger: "rule.card"
    notes: "ARBITER writes owner and district on Grant Deed"
  - beat: "Month 2 — Beat 3"
    subject: "ARBITER"
    verb: "Move"
    trigger: "rule.card"
    notes: "ARBITER places completed Grant Deed in acting faction case"
  - beat: "Debrief"
    subject: "Faction"
    verb: "Move"
    trigger: "phase.during"
    notes: "Faction moves completed Grant Deed to Faction hand"
  - beat: "Month 1 — Beat 3"
    subject: "Faction"
    verb: "Invoke"
    trigger: "player.introduce_card"
    notes: "Faction plays/invokes Grant Deed React window"
  - beat: "Month 1 — Beat 3"
    subject: "ARBITER"
    verb: "Remove"
    trigger: "rule.card"
    notes: "ARBITER removes/consumes Grant Deed after React trigger"
  - beat: "Month 2 — Beat 3"
    subject: "Faction"
    verb: "Invoke"
    trigger: "player.introduce_card"
    notes: "Faction plays/invokes Grant Deed React window"
  - beat: "Month 2 — Beat 3"
    subject: "ARBITER"
    verb: "Remove"
    trigger: "rule.card"
    notes: "ARBITER removes/consumes Grant Deed after React trigger"
  - beat: "Month 3 — Beat 4"
    subject: "Faction"
    verb: "Invoke"
    trigger: "player.introduce_card"
    notes: "Faction plays/invokes Grant Deed React window"
  - beat: "Month 3 — Beat 4"
    subject: "ARBITER"
    verb: "Remove"
    trigger: "rule.card"
    notes: "ARBITER removes/consumes Grant Deed after React trigger"
