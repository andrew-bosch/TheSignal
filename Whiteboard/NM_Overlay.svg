<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" style="background-color: #0a0c0f; font-family: 'Courier New', monospace;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c222b" stroke-width="0.5" />
    </pattern>
    
    <filter id="tactical-tint">
      <feColorMatrix type="matrix" values="
        0.1 0.3 0.4 0 -0.05
        0.1 0.3 0.4 0 -0.05
        0.1 0.3 0.5 0 0.05
        0   0   0   1 0" />
    </filter>

    <filter id="ui-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0a0c0f" />

  <image href="nm.png" 
         width="100%" height="90%" preserveAspectRatio="xMidYMid slice" 
         opacity="0.5" filter="url(#tactical-tint)" />
         
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <g>
