      .panel { fill: #111827; stroke: #374151; stroke-width: 2; rx: 8; ry: 8; }
      .chair { fill: #0B0F19; stroke: #374151; stroke-width: 2; stroke-dasharray: 4 4; rx: 12; ry: 12; }
      .central-area { fill: #080b13; stroke: #3B82F6; stroke-width: 2; rx: 16; ry: 16; }
      .title { fill: #F3F4F6; font-family: "Inter", "Segoe UI", sans-serif; font-size: 20px; font-weight: 600; text-anchor: middle; }
      .subtitle { fill: #9CA3AF; font-family: "Inter", "Segoe UI", sans-serif; font-size: 14px; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="1400" />
