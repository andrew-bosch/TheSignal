<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0B0F19; }
      .panel { fill: #111827; stroke: #374151; stroke-width: 2; rx: 8; ry: 8; }
      .panel-dash { fill: transparent; stroke: #4B5563; stroke-width: 2; stroke-dasharray: 6 6; rx: 8; ry: 8; }
      .title { fill: #F3F4F6; font-family: "Inter", "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; text-anchor: middle; }
      .subtitle { fill: #9CA3AF; font-family: "Inter", "Segoe UI", sans-serif; font-size: 13px; text-anchor: middle; }
      .city-placeholder { fill: #080b13; stroke: #3B82F6; stroke-width: 2; rx: 16; ry: 16; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="1600" />
  <rect class="panel" x="60" y="100" width="220" height="80" />
  <text class="title" x="170.0" y="130.0" dominant-baseline="middle">SESSION TIMELINE</text>
  <text class="subtitle" x="170.0" y="150.0" dominant-baseline="middle">zone_session_timeline</text>
  <rect class="panel" x="60" y="200" width="220" height="80" />
  <text class="title" x="170.0" y="230.0" dominant-baseline="middle">INITIATIVE STRIP</text>
  <text class="subtitle" x="170.0" y="250.0" dominant-baseline="middle">zone_initiative_strip</text>
  <rect class="panel" x="920" y="100" width="220" height="80" />
  <text class="title" x="1030.0" y="130.0" dominant-baseline="middle">SITUATION REPORT</text>
  <text class="subtitle" x="1030.0" y="150.0" dominant-baseline="middle">zone_situation_report</text>
  <rect class="panel" x="920" y="200" width="220" height="80" />
  <text class="title" x="1030.0" y="230.0" dominant-baseline="middle">CHORUS ACTIVITY</text>
  <text class="subtitle" x="1030.0" y="250.0" dominant-baseline="middle">zone_chorus_activity</text>
  <rect class="panel-dash" x="300" y="100" width="600" height="220" />
  <text class="subtitle" x="600" y="130" text-anchor="middle">SUPPLY ZONE (zone_supply)</text>
  <rect class="panel" x="340" y="150" width="240" height="140" />
  <text class="title" x="460.0" y="220.0" dominant-baseline="middle">RESERVOIR</text>
  <rect class="panel" x="620" y="150" width="240" height="140" />
  <text class="title" x="740.0" y="220.0" dominant-baseline="middle">BACKLOG</text>
  <rect class="panel" x="420" y="420" width="160" height="100" />
  <text class="title" x="500.0" y="460.0" dominant-baseline="middle">RING 1 MODS</text>
  <text class="subtitle" x="500.0" y="480.0" dominant-baseline="middle">zone_ring_1_modifier</text>
  <rect class="panel" x="240" y="420" width="160" height="100" />
  <text class="title" x="320.0" y="460.0" dominant-baseline="middle">RING 2 MODS</text>
  <text class="subtitle" x="320.0" y="480.0" dominant-baseline="middle">zone_ring_2_modifier</text>
  <rect class="panel" x="60" y="420" width="160" height="100" />
  <text class="title" x="140.0" y="460.0" dominant-baseline="middle">RING 3 MODS</text>
  <text class="subtitle" x="140.0" y="480.0" dominant-baseline="middle">zone_ring_3_modifier</text>
  <rect class="city-placeholder" x="40" y="560" width="1120" height="640" />
  <text class="title" x="600" y="880" dominant-baseline="middle" style="font-size: 24px; fill: #3B82F6;">CITY MAP</text>
  <rect class="panel" x="200" y="1250" width="800" height="100" />
  <text class="title" x="600.0" y="1290.0" dominant-baseline="middle">ACCORD PLACEMENT AREA</text>
  <text class="subtitle" x="600.0" y="1310.0" dominant-baseline="middle">zone_accord_area</text>
  <rect class="panel" x="200" y="1400" width="800" height="100" />
  <text class="title" x="600.0" y="1440.0" dominant-baseline="middle">PUBLIC STANDING TRACK</text>
  <text class="subtitle" x="600.0" y="1460.0" dominant-baseline="middle">zone_public_standing</text>
  <rect x="40" y="40" width="1120" height="1520" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3" rx="16" ry="16" />
  <text x="600" y="70" class="subtitle" text-anchor="middle" style="fill: #3B82F6;">CENTRAL AREA (zone_central_area)</text>
  <line x1="600" y1="40" x2="600" y2="1560" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4 8" stroke-opacity="0.1" />
</svg>